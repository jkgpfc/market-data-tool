name: Generate Nifty 50 Excel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-nifty50:
    name: Generate Nifty 50 workbook
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Nifty 50 Excel workbook
        run: python main.py --csv nifty50_symbols.csv --output nifty50.xlsx

      - name: Stage generated workbook under output
        run: |
          mkdir -p output
          cp nifty50.xlsx output/nifty50.xlsx

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: nifty50.xlsx
          path: nifty50.xlsx
          if-no-files-found: error

      - name: Commit generated workbook
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f output/nifty50.xlsx
          if git diff --cached --quiet; then
            echo "No generated workbook changes to commit."
          else
            git commit -m "Update generated Nifty 50 workbook"
            git push
          fi
